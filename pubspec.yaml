name: pointagepro
description: PointagePro

publish_to: 'none'

version: 1.3.5+18

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  http: ^1.2.2
  intl: ^0.19.0
  geolocator: ^13.0.2
  mobile_scanner: ^7.0.1
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1
  webview_flutter: ^4.13.0
  wakelock_plus: ^1.3.2
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true

  image_path: "assets/icon/pointagepro_icon.png"

  remove_alpha_ios: true

  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/pointagepro_icon.png"

  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/icon/pointagepro_logo.png
    - assets/icon/pointagepro_icon.png